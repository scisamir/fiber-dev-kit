<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fiber-inspector</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <div class="eyebrow">Fiber Dev Kit</div>
      <h1>fiber-inspector</h1>
    </div>
    <div class="topbar-meta">
      <span id="event-beacon" class="event-beacon">quiet</span>
      <span id="last-updated" class="muted mono">waiting for data</span>
      <span id="ws-status" class="pill">connecting</span>
    </div>
  </header>

  <main>
    <section class="topology-panel" aria-label="Fiber topology">
      <div class="panel-heading">
        <h2>Topology</h2>
        <div class="topology-stats">
          <span id="metric-health">--</span>
          <span id="metric-peers">0 peers</span>
          <span id="metric-channels">0 channels</span>
          <span id="metric-payments">0 payments</span>
          <span id="metric-alerts">0 alerts</span>
        </div>
      </div>
      <div id="topology-map" class="topology-map"></div>
    </section>

    <section class="panel panel-nodes">
      <div class="panel-heading">
        <h2>Node Health</h2>
        <span id="nodes-count" class="panel-count">0 nodes</span>
      </div>
      <div id="nodes-list" class="list"></div>
    </section>

    <section class="panel panel-channels">
      <div class="panel-heading">
        <h2>Channels</h2>
        <span id="channels-count" class="panel-count">0 channels</span>
      </div>
      <div id="channels-list" class="list"></div>
    </section>

    <section class="panel panel-wide">
      <div class="panel-heading">
        <h2>Alerts</h2>
        <span id="alerts-count" class="panel-count">0 active</span>
      </div>
      <div id="alerts-list" class="list"></div>
    </section>

    <section class="panel panel-wide">
      <div class="panel-heading">
        <h2>Payment Trace</h2>
        <span id="payments-count" class="panel-count">0 payments</span>
      </div>
      <div id="payments-list" class="list"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
